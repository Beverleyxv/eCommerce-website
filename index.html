<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
   <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
   <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css">
   <title>Shopping App</title>
</head>
<body>
    <nav>
      <div class="navTop">
          <div class="navItem">
            <h4>FLATTER FIT</h4>
          </div>
            <div class="search">
              <input type="text" placeholder="Search..." class="searchInput">
              <a href="" class="searchIcon">
                <i class="fa-solid fa-magnifying-glass"></i>
              </a>
            </div>
          <div class="navItem">
            <span class="limitedOffer"> Limited Offer!</span>
          </div>
      </div>
      <div class="navBottom mt-3">
        <h3 class="menuItem">Corset Top</h3>
        <h3 class="menuItem">Bustier Top</h3>
        <h3 class="menuItem">Bodycon Dress</h3>
        <h3 class="menuItem">Summer Dress</h3>
        <h3 class="menuItem">Bikini Set</h3>
      </div>
    </nav>
    <div class="container">
      <div class="row mb-5 center">
        <div class="col">
          <img src="/images/Corset 1.jpeg" alt="" class="productImg img-fluid">
          <div class="slideBg"></div>
          <h1 class="productTitle">BUSTIER CORSET TOP</h1>
          <h2 class="productPrice">$50</h2>
        </div>
        <div class="col">
          <img src="/images/Summer 1.jpeg" alt="" class="productImg img-fluid">
          <div class="slideBg"></div>
          <h1 class="productTitle"> BUSTIER SUMMER DRESS</h1>
          <h2 class="productPrice">$150</h2>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <img src="/images/Bodycon 1.jpeg" alt="" class="productImg img-fluid">
          <div class="slideBg"></div>
          <h1 class="productTitle"> BODYCON DRESS</h1>
          <h2 class="productPrice">$120</h2> 
        </div>
        <div class="col mb-5">
          <img src="/images/Bikini 1.jpeg" alt="" class="productImg img-fluid">
          <div class="slideBg"></div>
          <h1 class="productTitle"> BIKINI SET</h1>
          <h2 class="productPrice">$50</h2>
        </div>
      </div>
    </div>
    <div class="product" id="product">
      <img src="/images/Corset 1.jpeg" alt="" class="itemImg">
      <div class="itemDetails">
        <h1 class="itemTitle">BUSTIER CORSET TOP</h1>
        <h2 class="itemPrice">$50</h2>
        <p class="itemDescription"> I will add description at a later stage</p>
      
      <div class="colors mb-2">
        <div class="color1"></div>
        <div class="color2"></div>
        <div class="color3"></div>
      </div>
      <div class="sizes mb-2">
        <div class="size">XS</div>
        <div class="size">S</div>
        <div class="size">M</div>
        <div class="size">L</div>
        <div class="size">XL</div>
      </div>
      <button class="payButton">Buy</button>
    </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
